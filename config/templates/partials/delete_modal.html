<!-- Delete Confirmation Modal -->
<div id="delete-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black/50" onclick="closeDeleteModal()"></div>
    <div class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <div class="flex items-center gap-4 mb-4">
                <div class="w-12 h-12 rounded-full bg-red-100 flex items-center justify-center">
                    <svg class="w-6 h-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-slate-900">Confirmar exclusão</h3>
                    <p class="text-sm text-slate-500">Esta ação não pode ser desfeita.</p>
                </div>
            </div>
            <p class="text-sm text-slate-600 mb-6" id="delete-modal-message">Tem certeza que deseja excluir este item?</p>
            <div class="flex gap-3 justify-end">
                <button onclick="closeDeleteModal()" class="btn btn-secondary">Cancelar</button>
                <form id="delete-modal-form" method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn bg-red-600 text-white hover:bg-red-700">Excluir</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
function openDeleteModal(url, message) {
    document.getElementById('delete-modal-form').action = url;
    document.getElementById('delete-modal-message').textContent = message || 'Tem certeza que deseja excluir este item?';
    document.getElementById('delete-modal').classList.remove('hidden');
}

function closeDeleteModal() {
    document.getElementById('delete-modal').classList.add('hidden');
}
</script>
