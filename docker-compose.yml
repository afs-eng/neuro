# ============================================================
# NeuroAvalia — Docker Compose (Desenvolvimento Local)
# Uso: docker compose up --build
# ============================================================

services:
  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: neuro-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: neuro_db
      POSTGRES_USER: neuro_user
      POSTGRES_PASSWORD: neuro_pass
    volumes:
      - neuro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuro_user -d neuro_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: neuro-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - neuro_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Ollama
  ollama:
    image: ollama/ollama:latest
    container_name: neuro-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - neuro_ollama_data:/root/.ollama

  # Backend Django
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: dev
    container_name: neuro-backend
    entrypoint: ["/app/infra/docker/backend.entrypoint.sh"]
    command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/app:cached
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://neuro_user:neuro_pass@db:5432/neuro_db
      - DEBUG=True
      - DJANGO_ENV=local
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend
      - CSRF_TRUSTED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
      - REDIS_URL=redis://redis:6379/1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=qwen3.5:9b
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Frontend Next.js
  frontend:
    build:
      context: ./neuro-frontend
      dockerfile: Dockerfile
      target: dev
    container_name: neuro-frontend
    command: sh -c "npm ci && npm run dev"
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./neuro-frontend:/app:cached
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - INTERNAL_API_BASE_URL=http://backend:8000
      - WATCHPACK_POLLING=true
    depends_on:
      - backend

volumes:
  neuro_postgres_data:
  neuro_redis_data:
  neuro_ollama_data:
