services:
  - type: web
    name: neuroavalia-backend
    env: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput
    preDeployCommand: python manage.py migrate
    startCommand: gunicorn config.wsgi:application --log-file -
    healthCheckPath: /healthz/
    envVars:
      - key: DJANGO_ENV
        value: production
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: neuroavalia-db
          property: connectionString
      - key: DATABASE_SSL_REQUIRE
        value: "True"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: neuro-k06p.onrender.com
      - key: CSRF_TRUSTED_ORIGINS
        value: https://neuro-k06p.onrender.com,https://neuro-7rqkwf1xv-andrefsilvas-projects.vercel.app
      - key: CORS_ALLOWED_ORIGINS
        value: https://neuro-7rqkwf1xv-andrefsilvas-projects.vercel.app
      - key: FRONTEND_BASE_URL
        value: https://neuro-7rqkwf1xv-andrefsilvas-projects.vercel.app
      - key: BACKEND_PUBLIC_URL
        value: https://neuro-k06p.onrender.com
      - key: ALLOW_VERCEL_PREVIEWS
        value: "True"
      - key: EMAIL_BACKEND
        value: django.core.mail.backends.smtp.EmailBackend
      - key: DEFAULT_FROM_EMAIL
        value: no-reply@neuroavalia.test
databases:
  - name: neuroavalia-db
    plan: free
