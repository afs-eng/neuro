# ============================================================
# NeuroAvalia — Docker Compose (Producao Self-Hosted)
# Uso: docker compose -f docker-compose.prod.yml up -d --build
# ============================================================

services:
  # PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: neuro-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - neuro_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Backend Django (Gunicorn)
  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
      target: prod
    container_name: neuro-backend-prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --log-file -
    restart: always
    expose:
      - "8000"
    volumes:
      - neuro_static_data:/app/staticfiles
      - neuro_media_data:/app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - .env.prod
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - DJANGO_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-backend,localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://meudominio.com}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-https://meudominio.com}
    depends_on:
      db:
        condition: service_healthy

  # Frontend Next.js (standalone production)
  frontend:
    build:
      context: ./neuro-frontend
      dockerfile: Dockerfile
      target: prod
      args:
        NEXT_PUBLIC_API_BASE_URL: ${BACKEND_PUBLIC_URL:-/api}
    container_name: neuro-frontend-prod
    restart: always
    expose:
      - "3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=${BACKEND_PUBLIC_URL:-/api}
    depends_on:
      - backend

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: neuro-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - neuro_static_data:/var/www/django/static:ro
      - neuro_media_data:/var/www/django/media:ro
    depends_on:
      - frontend
      - backend

volumes:
  neuro_postgres_data:
  neuro_static_data:
  neuro_media_data:
