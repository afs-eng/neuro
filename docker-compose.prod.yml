services:
  db:
    image: postgres:16-alpine
    container_name: neuro-db-prod
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - neuro_postgres_data_prod:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: neuro-backend-prod
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --log-file -
    restart: always
    expose:
      - "8000"  # Porta não atinge a VPS externa, apenas o Nginx pode falar com ele
    volumes:
      # Volumes persistentes obrigatórios na arquitetura real
      - neuro_static_data:/app/staticfiles
      - neuro_media_data:/app/media
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - DEBUG=False
      - DJANGO_ENV=production
      - SECRET_KEY=${SECRET_KEY}
      - AI_PROVIDER=${AI_PROVIDER:-ollama}
      - OLLAMA_BASE_URL=${DOCKER_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      - OLLAMA_MODEL=${DOCKER_OLLAMA_MODEL:-qwen3.5:27b}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-backend,localhost}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - FRONTEND_BASE_URL=${FRONTEND_BASE_URL:-https://meudominio.com}
      - BACKEND_PUBLIC_URL=${BACKEND_PUBLIC_URL:-https://meudominio.com/api}
    depends_on:
      - db

  frontend:
    build:
      context: ./neuro-frontend
      dockerfile: Dockerfile
      args:
        # A URL que a build usará no Next Auth / Next Public
        NEXT_PUBLIC_API_BASE_URL: ${BACKEND_PUBLIC_URL:-/api}
    container_name: neuro-frontend-prod
    restart: always
    expose:
      - "3000"  # Protegido até o Nginx interceder
    environment:
      - PORT=3000
      - NEXT_PUBLIC_API_BASE_URL=${BACKEND_PUBLIC_URL:-/api}
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: neuro-nginx-prod
    restart: always
    ports:
      - "80:80"  # HTTPS a ser configurado futuramente por Traefik/Certbot
      - "443:443"
    volumes:
      - ./infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - neuro_static_data:/var/www/django/static:ro
      - neuro_media_data:/var/www/django/media:ro
    depends_on:
      - frontend
      - backend

volumes:
  neuro_postgres_data_prod:
  neuro_static_data:
  neuro_media_data:
